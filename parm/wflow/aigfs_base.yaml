workflow:
  attrs:
    realtime: False
    scheduler: "{{ platform.scheduler }}"
  cycledef:
    - attrs:
        group: forecast
      spec: "{{ user.first_cycle.strftime('%Y%m%d%H%M') }} {{ user.last_cycle.strftime('%Y%m%d%H%M') }} {{user.cycle_freq}}"
  entities:
    EXPERIMENT_CONFIG: "{{user.experiment_dir}}/experiment.yaml"
    LOGDIR: "{{user.experiment_dir}}/log"
    AIGFS_APP: "{{ user.aigfs_home }}"
    PLATFORM: "{{ user.platform }}"
  log:
    value: "{{ user.experiment_dir }}/workflow.log"
  entities:
    EXPERIMENT_CONFIG: "{{user.experiment_dir}}/experiment.yaml"
    LOGDIR: "{{user.experiment_dir}}/log"
    AIGFS_APP: "{{ user.aigfs_app }}"
    PLATFORM: "{{ user.platform }}"
  tasks:
    task_prep:
      account: "{{ platform.account }}"
      command:
        cyclestr:
          value: source &AIGFS_APP;/load_wflow_modules.sh &PLATFORM; && uw execute
            --module &AIGFS_APP/drivers/generate_ics.py
            --classname GenICS
            --task run
            --config &EXPERIMENT_CONFIG;
            --cycle @Y-@m-@dT@H
            --key-path prep
      join:
       cyclestr:
         value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H.log'
      memory: "{{ prep.aigfs_ics.execution.batchargs.memory }}"
      nodes: "{{ prep.aigfs_ics.execution.batchargs.nodes }}:ppn={{ prep.aigfs_ics.execution.batchargs.tasks_per_node }}"
      walltime: "{{ prep.aigfs_ics.execution.batchargs.walltime }}"
    task_forecast:
      account: "{{ platform.account }}"
      command:
        cyclestr:
          value: source &AIGFS_APP;/load_wflow_modules.sh &PLATFORM; && uw execute
            --module &AIGFS_APP/drivers/run_graphcast.py
            --classname GraphCastModel
            --task run
            --config &EXPERIMENT_CONFIG;
            --cycle @Y-@m-@dT@H
            --key-path forecast
      join:
       cyclestr:
         value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H.log'
      nodes: "{{ forecast.graphcast_model.execution.batchargs.nodes }}:ppn={{ forecast.graphcast_model.execution.batchargs.tasks_per_node }}"
      memory: "{{ forecast.graphcast_model.execution.batchargs.memory }}"
      walltime: "{{ forecast.graphcast_model.execution.batchargs.walltime }}"
    metatask_post:
      var:
        fhr: "{% for h in range(0, forecast.graphcast_model.forecast_length + 1, forecast.graphcast_model.forecast_freq) %}{{ ' %03d' % h }}{% endfor %}"
        nextfhr: "{% for h in range(forecast.graphcast_model.forecast_freq, forecast.graphcast_model.forecast_length + forecast.graphcast_model.forecast_freq + 1, forecast.graphcast_model.forecast_freq) %}{{ ' %03d' % h }}{% endfor %}"
      task_post_#fhr#:
        account: "{{ platform.account }}"
        command:
          cyclestr:
            value: echo HELLO
        join:
         cyclestr:
           value: '&LOGDIR;/{{ jobname }}_@Y@m@d@H.log'
        nodes: "{{ post.execution.batchargs.nodes }}:ppn={{ post.execution.batchargs.tasks_per_node }}"
        memory: "{{ post.execution.batchargs.memory }}"
        walltime: "{{ post.execution.batchargs.walltime }}"
        dependency:
          or:
            and:
              datadep_pres:
                value:
                  cyclestr:
                    value: "{{ user.experiment_dir }}/@Y@m@d@H/forecast/aigfs.t@Hz.pres.f#nextfhr#.grib2"
              datadep_sfc:
                value:
                  cyclestr:
                    value: "{{ user.experiment_dir }}/@Y@m@d@H/forecast/aigfs.t@Hz.sfc.f#nextfhr#.grib2"
            taskdep:
              attrs:
                task: forecast


