properties:
  aigfs_ics:
    additional_properties: false
    properties:
      execution:
        $ref: urn:uwtools:execution-parallel
      files_to_copy:
        $ref: urn:uwtools:files-to-stage
      files_to_hardlink:
        $ref: urn:uwtools:files-to-stage
      files_to_link:
        $ref: urn:uwtools:files-to-stage
      rundir:
        type: string
      variable_extraction_yaml:
        type: string
    required:
      - execution
      - rundir
      - variable_extraction_yaml
    anyOf:
      - properties:
          files_to_copy:
            type: object
            patternProperties:
              "^data/": {}
            minProperties: 1
      - properties:
          files_to_hardlinke:
            type: object
            patternProperties:
              "^data/": {}
            minProperties: 1
      - properties:
          files_to_link:
            type: object
            patternProperties:
              "^data/": {}
            minProperties: 1
    type: object
required:
  - aigfs_ics
type: object
